<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad1)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Architecture diagram -->
  <g transform="translate(100, 150)">
    <!-- Devices box -->
    <rect x="0" y="0" width="180" height="120" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <text x="90" y="30" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Devices</text>
    <text x="90" y="55" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle">(Sensors)</text>
    
    <!-- Backend box -->
    <rect x="350" y="0" width="180" height="120" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <text x="440" y="30" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Backend</text>
    <text x="440" y="55" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle">(Node.js)</text>
    
    <!-- Frontend box -->
    <rect x="700" y="0" width="180" height="120" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <text x="790" y="30" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Frontend</text>
    <text x="790" y="55" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle">(React)</text>
    
    <!-- Database box -->
    <rect x="350" y="200" width="180" height="100" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <text x="440" y="235" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">MongoDB</text>
    <text x="440" y="265" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle">Database</text>
    
    <!-- Arrows -->
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="rgba(255,255,255,0.8)" />
      </marker>
    </defs>
    
    <!-- Device to Backend -->
    <line x1="180" y1="60" x2="350" y2="60" stroke="rgba(255,255,255,0.8)" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Backend to Frontend -->
    <line x1="530" y1="60" x2="700" y2="60" stroke="rgba(255,255,255,0.8)" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Backend to Database -->
    <line x1="440" y1="120" x2="440" y2="200" stroke="rgba(255,255,255,0.8)" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- Feedback arrow -->
    <path d="M 700 80 Q 625 150 530 80" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="42" fill="white" text-anchor="middle" font-weight="bold">IoT System Architecture</text>
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.9)" text-anchor="middle">Real-time Monitoring • Scalable • Secure</text>
</svg>
